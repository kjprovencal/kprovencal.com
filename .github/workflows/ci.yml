name: CI

on:
  push:
    branches: [main, markdown]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend (TypeScript / Vitest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test with coverage
        run: npm run test:coverage

      - name: Coverage summary (job summary)
        run: |
          echo "### Frontend coverage (Vitest)" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          jq -r '.total | "Total: **\(.statements.pct)%** statements · **\(.branches.pct)%** branches · **\(.functions.pct)%** functions · **\(.lines.pct)%** lines"' coverage/coverage-summary.json >> "$GITHUB_STEP_SUMMARY"

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: coverage/lcov.info
          flags: frontend
          fail_ci_if_error: false

  api:
    name: API (Go)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: api/go.mod
          cache-dependency-path: api/go.sum

      - name: Test with coverage
        run: go test ./... -race -coverprofile=coverage.out -covermode=atomic

      - name: Coverage summary (job summary)
        run: |
          echo "### API coverage (Go)" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          go tool cover -func=coverage.out | tail -1 >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: api/coverage.out
          flags: api
          fail_ci_if_error: false
