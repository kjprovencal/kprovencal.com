name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend (TypeScript / Vitest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test with coverage
        run: npm run test:coverage

      - name: Coverage summary (job summary)
        run: |
          echo "### Frontend coverage (Vitest)" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          jq -r '.total | "Total: **\(.statements.pct)%** statements · **\(.branches.pct)%** branches · **\(.functions.pct)%** functions · **\(.lines.pct)%** lines"' coverage/coverage-summary.json >> "$GITHUB_STEP_SUMMARY"

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: coverage/lcov.info
          flags: frontend
          fail_ci_if_error: false

      - name: Upload dist for deploy
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: site-dist
          path: dist/

  api:
    name: API (Go)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: api/go.mod
          cache-dependency-path: api/go.sum

      - name: Test with coverage
        run: go test ./... -race -coverprofile=coverage.out -covermode=atomic

      - name: Coverage summary (job summary)
        run: |
          echo "### API coverage (Go)" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          go tool cover -func=coverage.out | tail -1 >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: api/coverage.out
          flags: api
          fail_ci_if_error: false

      - name: Build release binary
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -trimpath -ldflags="-s -w" -o personal-site-api .

      - name: Upload API binary for deploy
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: site-api
          path: api/personal-site-api

  deploy:
    name: Deploy to droplet
    needs: [frontend, api]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Download dist
        uses: actions/download-artifact@v4
        with:
          name: site-dist
          path: dist

      - name: Download API binary
        uses: actions/download-artifact@v4
        with:
          name: site-api
          path: api-bin

      - name: SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add SSH known hosts
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          ssh-keyscan -H "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts

      - name: Rsync static site and install API binary
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          set -euxo pipefail
          TARGET="${SSH_USER}@${SSH_HOST}"
          # dist/ owned by SSH_USER; chgrp to www-data so nginx can read via group (see deploy/SETUP.txt).
          rsync -avz --delete dist/ "${TARGET}:${DEPLOY_PATH}/dist/"
          scp api-bin/personal-site-api "${TARGET}:/tmp/personal-site-api.new"
          ssh "$TARGET" "sudo install -m 755 -o www-data -g www-data /tmp/personal-site-api.new '${DEPLOY_PATH}/personal-site-api' && sudo rm -f /tmp/personal-site-api.new && sudo chgrp -R www-data '${DEPLOY_PATH}/dist' && sudo systemctl restart personal-site-api"
